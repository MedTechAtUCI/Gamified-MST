name: Deploy Gamified-MST webpage on push

on:
  push:
    branches:
      - main

permissions:
  contents: write 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.9.0'

      - name: List files in directory
        run: ls gamified-mst

      - name: Set environment variable
        run: |
          echo "NEXT_PUBLIC_AWS_S3_BUCKET=${{ secrets.NEXT_PUBLIC_AWS_S3_BUCKET }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_AWS_METRICS_API=${{ secrets.NEXT_PUBLIC_AWS_METRICS_API }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm install
        working-directory: gamified-mst

      - name: Build the app
        run: CI=false npm run build
        working-directory: gamified-mst

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gamified-mst/out
          publish_branch: Website_Deployment
          cname: mst.medtech-uci.com